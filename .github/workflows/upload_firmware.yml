name: Upload and Release Himax Firmware

on:
  push:
    branches:
      - dev
      - 'fix/firmware-upload-ci'
      - 'no-model-load'
      - 'refactor_model_loading'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Supabase environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env_select.outputs.ENVIRONMENT }}
    steps:
      - name: Resolve Environment
        id: env_select
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENVIRONMENT="${{ inputs.environment }}"
          else
            ENVIRONMENT="production"
          fi
          echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_OUTPUT

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for semantic versioning

      - name: Calculate Semantic Version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          dry_run: true # Don't create tag yet, just calculate version
          tag_prefix: v
          initial_version: 0.0.0
          
      - name: Generate Release Notes
        id: release_notes
        shell: bash
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            # No previous tags, get all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since last tag
            COMMITS=$(git log "$LAST_TAG..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Save to environment variable
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "Generated release notes:"
          echo "$COMMITS"

      - name: Find Generated Image
        id: find_image
        shell: bash
        run: |
          # Use the pre-built image committed to the repository
          IMG_FILE="./we2_image_gen_local_dpd/output_case1_sec_wlcsp/output.img"
          
          if [ -f "$IMG_FILE" ]; then
            FULL_PATH=$(readlink -f "$IMG_FILE")
            echo "Found image: $FULL_PATH"
            echo "firmware_path=$FULL_PATH" >> $GITHUB_OUTPUT
          else
            echo "Error: Pre-built .img file not found at $IMG_FILE!"
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-image
          path: ${{ steps.find_image.outputs.firmware_path }}
          retention-days: 30

  upload-to-supabase:
    needs: [build-and-deploy, setup]
    runs-on: ubuntu-latest
    if: success()
    environment: ${{ needs.setup.outputs.environment }}
    
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.SUPABASE_URL_DEV }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY_DEV }}
      SYSTEM_EMAIL: ${{ secrets.SYSTEM_EMAIL || secrets.SYSTEM_EMAIL_DEV }}
      FALLBACK_USER_ID: ${{ secrets.FALLBACK_USER_ID || secrets.FALLBACK_USER_ID_DEV }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-image
          path: ./firmware

      - name: Calculate Semantic Version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          dry_run: true
          tag_prefix: v

      - name: Extract Device Version
        id: version
        run: |
          IMG_FILE="./firmware/output.img"
          if [ ! -f "$IMG_FILE" ]; then 
            IMG_FILE=$(find ./firmware -name "*.img" | head -n 1)
          fi
          
          # Extract the exact __TIME__ and __DATE__ embedded by the C compiler
          BUILD_TIME=$(strings "$IMG_FILE" | grep -Eo "^[0-2][0-9]:[0-5][0-9]:[0-5][0-9]$" | tail -n 1)
          BUILD_DATE=$(strings "$IMG_FILE" | grep -Eo "^[A-Z][a-z]{2} +[0-9]{1,2} 20[0-9]{2}$" | tail -n 1)
          
          # Extract board name from ww.mk 
          BOARD_NAME=$(grep "^BOARD_NAME_STRING" EPII_CM55M_APP_S/app/ww_projects/ww.mk | awk -F'"' '{print $2}' | head -n 1)
          
          if [ -z "$BOARD_NAME" ]; then 
            BOARD_NAME="WW500_C02"
          fi
          
          if [ -n "$BUILD_TIME" ] && [ -n "$BUILD_DATE" ]; then
             UNIQUE_VERSION="${BOARD_NAME} ${BUILD_TIME} ${BUILD_DATE}"
          else
             # Fallback to Semantic version + build number
             SEMVER="${{ steps.semver.outputs.new_tag }}"
             UNIQUE_VERSION="${SEMVER}.${{ github.run_number }}"
          fi
          
          echo "unique_version=${UNIQUE_VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted device version: ${UNIQUE_VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm install @supabase/supabase-js
        working-directory: ./scripts

      - name: Set Firmware Path
        run: |
          # The artifact contains output.img
          FIRMWARE_FILE="./firmware/output.img"
          
          # Find actual filename if it's not output.img
          if [ ! -f "$FIRMWARE_FILE" ]; then
             FIRMWARE_FILE=$(find ./firmware -name "*.img" | head -n 1)
          fi

          if [ -n "$FIRMWARE_FILE" ] && [ -f "$FIRMWARE_FILE" ]; then
            FULL_PATH=$(readlink -f "$FIRMWARE_FILE")
            echo "FIRMWARE_PATH=$FULL_PATH" >> "$GITHUB_ENV"
            echo "Found firmware at: $FULL_PATH"
          else
            echo "Error: firmware file not found!"
            ls -R ./firmware/
            exit 1
          fi

      - name: Upload to Supabase
        working-directory: ./scripts
        env:
          FIRMWARE_VERSION: ${{ steps.version.outputs.unique_version }}
          RELEASE_NOTES: |
            Himax AI firmware ${{ steps.version.outputs.unique_version }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Build: #${{ github.run_number }}
            
            Changes since last tag:
            ${{ steps.semver.outputs.changelog }}
        run: node upload_firmware.js
        
      - name: Create Git Tag
        if: success() && (github.ref == 'refs/heads/main')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.semver.outputs.new_tag }} -m "Release ${{ steps.semver.outputs.new_tag }}"
          git push origin ${{ steps.semver.outputs.new_tag }}

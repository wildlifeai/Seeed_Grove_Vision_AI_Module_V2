name: Sync Upstream to Dev

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:      # Manual trigger

jobs:
  update-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev # Start on dev branch
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/HimaxWiseEyePlus/Seeed_Grove_Vision_AI_Module_V2.git || true
          git fetch upstream

      - name: Check for updates
        id: check_updates
        run: |
          # Compare upstream main against our origin dev
          UPSTREAM_COMMITS=$(git rev-list origin/dev..upstream/main --count)
          echo "Upstream is $UPSTREAM_COMMITS commits ahead of dev"
          if [ "$UPSTREAM_COMMITS" -gt 0 ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync upstream branch and Create PR
        if: steps.check_updates.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Push upstream main to our remote as sync-upstream-to-dev
          git checkout -B sync-upstream-to-dev upstream/main
          git push origin sync-upstream-to-dev -f
          
          # Check if PR already exists in OUR repository (not upstream)
          PR_EXISTS=$(gh pr list --repo ${{ github.repository }} --head sync-upstream-to-dev --base dev --json url --jq 'length')
          
          if [ "$PR_EXISTS" -eq 0 ]; then
            gh pr create \
              --repo ${{ github.repository }} \
              --base dev \
              --head sync-upstream-to-dev \
              --title "Merge Upstream Updates into Dev" \
              --body "This is an automated PR to sync the latest changes from the original repository into our \`dev\` branch. Review for conflicts and merge." \
              --reviewer acutetech,Tobyntobyn,victor-wildlife
          else
            echo "PR already exists"
          fi

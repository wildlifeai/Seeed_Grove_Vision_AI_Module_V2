name: Build and Release Himax Firmware

on:
  push:
    branches:
      - dev
      - 'fix/firmware-upload-ci'
  workflow_dispatch: # Allow manual triggering

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Optional: Email address to query for system user
      SYSTEM_EMAIL: ${{ secrets.SYSTEM_EMAIL }}
      # Optional: Fallback user ID if database queries fail
      FALLBACK_USER_ID: ${{ secrets.FALLBACK_USER_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for semantic versioning

      - name: Calculate Semantic Version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          dry_run: true # Don't create tag yet, just calculate version
          tag_prefix: v
          initial_version: 0.0.0
          
      - name: Generate Release Notes
        id: release_notes
        shell: bash
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            # No previous tags, get all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since last tag
            COMMITS=$(git log "$LAST_TAG..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Save to environment variable
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "Generated release notes:"
          echo "$COMMITS"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm install @supabase/supabase-js
        working-directory: ./scripts # We'll create package.json here or run in root

      - name: Install Arm GNU Toolchain
        run: |
          wget "https://developer.arm.com/-/media/Files/downloads/gnu/13.2.rel1/binrel/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi.tar.xz"
          tar -xf arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi.tar.xz
          echo "$PWD/arm-gnu-toolchain-13.2.rel1-x86_64-arm-none-eabi/bin" >> $GITHUB_PATH

      - name: Find GCC Path
        id: find_gcc
        shell: bash
        run: |
          GCC_PATH=$(find $PWD -name "arm-none-eabi-gcc" -type f | head -n 1)
          if [ -z "$GCC_PATH" ]; then
            echo "Error: Could not find arm-none-eabi-gcc"
            exit 1
          fi
          BIN_DIR=$(dirname "$GCC_PATH")
          echo "GCC Bin Dir: $BIN_DIR"
          echo "GNU_TOOLPATH=$BIN_DIR/" >> $GITHUB_ENV

      - name: Verify Build Configuration
        working-directory: ./EPII_CM55M_APP_S
        run: |
          echo "=== Makefile Configuration ==="
          echo "PROJECT_FOLDER:"
          grep '^PROJECT_FOLDER' makefile | grep -v '^#' || true
          echo ""
          echo "APP_TYPE check in ww.mk:"
          grep '^APP_TYPE' app/ww_projects/ww.mk | grep -v '^#' || true
          echo ""
          echo "CIS_SUPPORT_INAPP_MODEL check in ww500_md.mk:"
          grep 'CIS_SUPPORT_INAPP_MODEL' app/ww_projects/ww500_md/ww500_md.mk | grep -v '^#' || true
          echo ""
          echo "Expected APPL_DEFINES with HM0360:"
          grep 'APPL_DEFINES.*HM0360' app/ww_projects/ww500_md/ww500_md.mk || echo "WARNING: No HM0360 defines found!"

      - name: Build Firmware (Make)
        working-directory: ./EPII_CM55M_APP_S
        run: |
          # Use the discovered toolchain path with verbose output
          echo "Building with verbose output to verify preprocessor defines..."
          make -j4 V=1 GNU_TOOLPATH="${{ env.GNU_TOOLPATH }}" 2>&1 | tee build.log
          
          echo ""
          echo "=== Checking for USE_HM0360_MD in build flags ==="
          if grep -i "USE_HM0360" build.log; then
            echo "✓ USE_HM0360 flags found in build!"
          else
            echo "⚠ WARNING: USE_HM0360_MD not found in build flags!"
            echo "This may explain why HM0360 sensor initialization fails."
          fi

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: EPII_CM55M_APP_S/build.log
          retention-days: 7

      # DISABLED: This was replacing the local tool with an external version that causes slot offset issues
      # The external tool's bootloader binaries cause firmware to boot from backup slot (0x00100000)
      # instead of primary slot (0x00000000), breaking model persistence.
      # - name: Fetch Correct DPD Image Gen Tool
      #   run: |
      #     echo "Cloning external repository to get correct image gen tool..."
      #     git clone --depth 1 https://github.com/stevehuang82/for_wildlife_ai.git temp_tools
      #     
      #     echo "Replacing ENTIRE we2_image_gen_local_dpd directory..."
      #     rm -rf we2_image_gen_local_dpd
      #     cp -r temp_tools/we2_image_gen_local_dpd .
      #     
      #     echo "Cleaning up..."
      #     rm -rf temp_tools

      - name: Verify Using Local Image Gen Tool
        run: |
          echo "=== Verifying we2_image_gen_local_dpd tool ===" 
          if [ -f "we2_image_gen_local_dpd/we2_local_image_gen" ]; then
            echo "✓ Using LOCAL committed we2_image_gen_local_dpd (same as Eclipse)"
            echo "  This should produce firmware that boots from primary slot (0x00000000)"
          else
            echo "✗ ERROR: we2_image_gen_local_dpd tool not found!"
            echo "  Make sure this directory is committed to the repository"
            exit 1
          fi


      - name: Analyze Binary Before Image Gen
        run: |
          echo "=== Analyzing compiled binary for HM0360 references ==="
          ELF_FILE="EPII_CM55M_APP_S/obj_epii_evb_icv30_bdv10/gnu_epii_evb_WLCSP65/EPII_CM55M_gnu_epii_evb_WLCSP65_s.elf"
          if [ -f "$ELF_FILE" ]; then
            ls -lh "$ELF_FILE"
            echo ""
            echo "Searching for HM0360-related strings in ELF:"
            if strings "$ELF_FILE" | grep -i "hm0360"; then
              echo "✓ HM0360 strings found in compiled binary"
            else
              echo "⚠ WARNING: No HM0360 strings found in ELF file!"
              echo "This confirms the HM0360 code was NOT compiled into the binary."
            fi
          else
            echo "ERROR: ELF file not found at $ELF_FILE"
            exit 1
          fi

      - name: Copy ELF to Image Gen Input Directory
        run: |
          echo "Copying compiled ELF file to image generation input directory..."
          mkdir -p we2_image_gen_local_dpd/input_case1_secboot/
          cp EPII_CM55M_APP_S/obj_epii_evb_icv30_bdv10/gnu_epii_evb_WLCSP65/EPII_CM55M_gnu_epii_evb_WLCSP65_s.elf \
             we2_image_gen_local_dpd/input_case1_secboot/ # Destination must exist in repo

      - name: Generate Firmware Image
        working-directory: ./we2_image_gen_local_dpd
        run: |
          # Ensure execution permissions for all tools
          chmod -R +x .
          # Run the image generation tool
          ./we2_local_image_gen project_case1_blp_wlcsp_rc24m.json

      - name: Analyze Generated Image
        run: |
          echo "=== Analyzing generated firmware image ==="
          IMG_FILE=$(find ./we2_image_gen_local_dpd/output_case1_sec_wlcsp -name "output.img" | head -n 1)
          if [ -n "$IMG_FILE" ] && [ -f "$IMG_FILE" ]; then
            ls -lh "$IMG_FILE"
            echo ""
            echo "Searching for HM0360-related strings in IMG:"
            if strings "$IMG_FILE" | grep -i "hm0360"; then
              echo "✓ HM0360 strings found in firmware image"
            else
              echo "⚠ WARNING: No HM0360 strings found in IMG file!"
            fi
          else
            echo "WARNING: Could not find generated image file"
          fi

      - name: ✅ Flash Slot Issue - FIXED
        run: |
          echo "======================================================================"
          echo " ✅ Flash Slot Model Persistence Issue - FIX APPLIED"
          echo "======================================================================"
          echo ""
          echo "PREVIOUS PROBLEM:"
          echo "  This workflow was fetching we2_image_gen_local_dpd from an external"
          echo "  GitHub repo (stevehuang82/for_wildlife_ai) which had DIFFERENT"
          echo "  bootloader binaries that caused firmware to boot from backup slot"
          echo "  (0x00100000) instead of primary slot (0x00000000)."
          echo ""
          echo "  This caused the firmware to re-write the model on every wake-up"
          echo "  because metadata addresses didn't match between boot sessions."
          echo ""
          echo "FIX APPLIED:"
          echo "  Now using the LOCAL committed we2_image_gen_local_dpd directory"
          echo "  (same tool Eclipse uses), which produces images that boot from"
          echo "  the primary slot correctly."
          echo ""
          echo "EXPECTED RESULT:"
          echo "  ✓ Firmware boots from slot 0x00000000 (primary)"
          echo "  ✓ Model metadata persists correctly across reboots"
          echo "  ✓ Model loads from flash instead of re-writing from SD"
          echo "  ✓ Fast wake-up times (~1-2 seconds instead of 5-10 seconds)"
          echo ""
          echo "VERIFICATION:"
          echo "  Check boot logs for 'slot flash_offset 0x00000000'"
          echo "  and 'Flash already contains model' message"
          echo "======================================================================"


      - name: Find Generated Image
        id: find_image
        shell: bash
        run: |
          # Find the .img file in the output directory
          # Note: working-directory is root here, so we must specify full relative path
          IMG_FILE=$(find ./we2_image_gen_local_dpd/output_case1_sec_wlcsp -name "output.img" | head -n 1)
          
          if [ -n "$IMG_FILE" ]; then
            # Resolve absolute path or make relative to scripts folder if easier
            FULL_PATH=$(readlink -f "$IMG_FILE")
            echo "Found image: $FULL_PATH"
            echo "FIRMWARE_PATH=$FULL_PATH" >> $GITHUB_ENV
            echo "firmware_path=$FULL_PATH" >> $GITHUB_OUTPUT
          else
            echo "No .img file found in output directory!"
            echo "Checking we2_image_gen_local_dpd content:"
            ls -R we2_image_gen_local_dpd
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-image
          path: ${{ steps.find_image.outputs.firmware_path }}
          retention-days: 30

  upload-to-supabase:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: success()
    
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SYSTEM_EMAIL: ${{ secrets.SYSTEM_EMAIL }}
      FALLBACK_USER_ID: ${{ secrets.FALLBACK_USER_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware-image
          path: ./firmware

      - name: Calculate Semantic Version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          dry_run: true
          tag_prefix: v

      - name: Generate Unique Version
        id: version
        run: |
          # Get the calculated semantic version (e.g., v0.1.2)
          SEMVER="${{ steps.semver.outputs.new_tag }}"
          
          # Add GitHub run number to ensure uniqueness (e.g., v0.1.2.1234)
          # Run number increments with each workflow run, guaranteeing uniqueness
          UNIQUE_VERSION="${SEMVER}.${{ github.run_number }}"
          
          echo "unique_version=${UNIQUE_VERSION}" >> $GITHUB_OUTPUT
          echo "Generated unique version: ${UNIQUE_VERSION}"
          echo "  Base version: ${SEMVER}"
          echo "  Build number: ${{ github.run_number }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm install @supabase/supabase-js
        working-directory: ./scripts

      - name: Prepare Versioned Firmware File
        run: |
          # The artifact contains output.img
          FIRMWARE_FILE="./firmware/output.img"
          
          # Find actual filename if it's not output.img
          if [ ! -f "$FIRMWARE_FILE" ]; then
             FIRMWARE_FILE=$(find ./firmware -name "*.img" | head -n 1)
          fi

          if [ -n "$FIRMWARE_FILE" ] && [ -f "$FIRMWARE_FILE" ]; then
            # Rename file to include version (e.g., output.img -> v0.1.2.123_output.img)
            VERSION="${{ steps.version.outputs.unique_version }}"
            DIRNAME=$(dirname "$FIRMWARE_FILE")
            BASENAME=$(basename "$FIRMWARE_FILE")
            VERSIONED_NAME="${VERSION}_${BASENAME}"
            VERSIONED_PATH="${DIRNAME}/${VERSIONED_NAME}"
            
            mv "$FIRMWARE_FILE" "$VERSIONED_PATH"
            
            FULL_PATH=$(readlink -f "$VERSIONED_PATH")
            echo "FIRMWARE_PATH=$FULL_PATH" >> "$GITHUB_ENV"
            echo "✓ Renamed firmware file:"
            echo "  From: $BASENAME"
            echo "  To:   $VERSIONED_NAME"
            echo "  Path: $FULL_PATH"
          else
            echo "Error: firmware file not found!"
            ls -R ./firmware/
            exit 1
          fi

      - name: Upload to Supabase
        working-directory: ./scripts
        env:
          FIRMWARE_VERSION: ${{ steps.version.outputs.unique_version }}
          RELEASE_NOTES: |
            Automated firmware build ${{ steps.version.outputs.unique_version }}
            
            Base version: ${{ steps.semver.outputs.new_tag }}
            Build: #${{ github.run_number }}
            Commit: ${{ github.sha }}
            
            Changes:
            ${{ steps.semver.outputs.changelog }}
        run: node upload_firmware.js
        
      - name: Create Git Tag
        if: success() && (github.ref == 'refs/heads/main')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.semver.outputs.new_tag }} -m "Release ${{ steps.semver.outputs.new_tag }}"
          git push origin ${{ steps.semver.outputs.new_tag }}

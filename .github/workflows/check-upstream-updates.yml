name: Sync Upstream to Dev

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:      # Manual trigger

jobs:
  update-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev # Start on dev branch
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/HimaxWiseEyePlus/Seeed_Grove_Vision_AI_Module_V2.git || true
          git fetch upstream

      - name: Check for updates
        id: check_updates
        run: |
          # Compare upstream main against our origin dev
          UPSTREAM_COMMITS=$(git rev-list origin/dev..upstream/main --count)
          echo "Upstream is $UPSTREAM_COMMITS commits ahead of dev"
          if [ "$UPSTREAM_COMMITS" -gt 0 ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request to Dev
        if: steps.check_updates.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync upstream changes to dev"
          title: "Merge Upstream Updates into Dev"
          body: |
            This is an automated PR to sync the latest changes from the original repository into our `dev` branch.
            
            **Action Required:** Review for conflicts and merge into `dev`.
          branch: sync-upstream-to-dev # The temp branch created for the PR
          base: dev                   # The branch we want to update
          labels: automated, upstream
          reviewers: acutetech, Tobyntobyn, victor-wildlife
